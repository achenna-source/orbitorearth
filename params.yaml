# OrbitOrEarth - parameters
# ==========================
# Basis: per kW of IT load, integrated over the GPU lifetime.
#
# !!! DEFAULTS ARE PLACEHOLDERS !!!
# The default values below are reverse-engineered so that the model reproduces
# the PRELIMINARY envelope table in the scoping brief (self-consistency check
# only). They are NOT sourced data. Before reporting ANY result in the paper,
# replace every entry whose `status` is `placeholder` with a cited value and a
# justified [low, high] range, then set `status: sourced` and fill `source`.
# Never present an invented number as real.

settings:
  launch_accounting: embodied_included   # embodied_included | combustion_only
  monte_carlo_samples: 100000
  seed: 0

# Reference orbit (the structural keystone; several parameters depend on it).
reference_orbit:
  regime: "dawn-dusk sun-synchronous LEO"
  nominal_altitude_km: 650          # Suncatcher, the most concrete program
  altitude_sensitivity_km: [500, 1600]   # 500 km (analyses) ; 1600 km (tether, high end)
  # Sourced: Suncatcher ~650 km dawn-dusk SSO; SpaceX/Starcloud SSO; ~500 km analysis
  # (arXiv 2603.28829); tether ~1600 km DDSS (arXiv 2512.09044).
  rationale: "continuous solar (no eclipse) -> operational carbon ~0"
  caveats:
    - "operational ~0 holds for DAWN-DUSK SSO specifically, NOT generic SSO (eclipse-bearing)."
    - "higher altitude -> more delta-V -> more launch CO2 AND worse black-carbon forcing (orbit-metric coupling)."
    - "altitude also drives radiation -> GPU lifetime / shielding mass."
    - "Three-Body/Star-Compute is Earth-observation (likely classic 10:30 SSO with eclipses): treat as the born-in-orbit EO example, not a dawn-dusk convergence point."

parameters:

  # --- terrestrial baseline ------------------------------------------------
  gpu_lifetime_years:
    value: 5.0
    low: 2.0
    high: 7.0
    unit: year
    # Itself an optimist/pessimist axis. Run-to-EOL design point: Suncatcher
    # radiation-tested TPUs for a 5-year mission at ~650 km SSO. Lower bound 2 =
    # terrestrial GPU refresh cadence (2-3 y, obsolescence) -- but in orbit a refresh
    # means a new launch (no cascade/recycling). Upper 7 = satellite-class hardware
    # life if run to radiation-limited EOL. Altitude-coupled (1600 km harsher).
    source: "Suncatcher 5-year mission life; GPU refresh cadence 2-3 y [industry]"
    status: sourced

  pue:
    value: 1.2
    low: 1.1
    high: 1.6
    unit: dimensionless
    # Displaced terrestrial facility = modern AI hyperscale DC. Industry-average PUE
    # 1.56 (Uptime Institute Global Data Center Survey 2024; flat 5 y); capacity-
    # weighted 1.47; cloud hyperscalers (Google, AWS, Microsoft) claim <=1.2 at some
    # sites (Meta Prineville ~1.15, top performers ~1.09). Central 1.2 = AI hyperscale
    # (the fair comparison; AI runs on hyperscale, not legacy). Range 1.1 to 1.6 (avg).
    source: "Uptime Institute Global Data Center Survey 2024 (industry avg 1.56; hyperscale claims <=1.2; top ~1.09)"
    status: sourced

  hours_per_year:
    value: 8766.0
    low: 8766.0
    high: 8766.0
    unit: hour/year
    source: "365.25 d x 24 h (definition)"
    status: sourced

  utilization:
    value: 0.7
    low: 0.5
    high: 0.9
    unit: dimensionless
    # Average IT load factor over lifetime (the orbital DC runs continuously too,
    # so the fair comparison is the cluster capacity factor). Hyperscale server
    # utilization ~40-60% [Uptime/IEA]; dedicated AI training/inference clusters run
    # near-continuously, ~0.6-0.9. Central 0.7. NOT 1.0 (100% always = unrealistic,
    # and biases the break-even low / toward orbit).
    source: "hyperscale server utilization 40-60% [Uptime 2024-2025]; AI clusters run near-continuously"
    status: sourced

  # --- orbital option ------------------------------------------------------
  system_mass_per_kw:
    value: 80.0
    low: 10.0
    high: 150.0
    unit: kg/kW
    # A FUNCTION of compute power density and radiator design, not uniform noise.
    # Radiator component (now sourced): conventional deployable ~12 kg/m2 rejecting
    # 100-350 W/m2 -> ~14-34 kg/kW (up to ~120 kg/kW at low rejection temperature);
    # advanced radiators 0.67-5.5 kg/kW (rotating-film, magnetic-droplet).
    # Low 10 = aggressive whole-system claims (SpaceX 100 kW/tonne; tether 5 kg/kW)
    # with advanced radiator. High 150 = conventional radiator + bus + solar +
    # structure for dense GPU heat. The 10-vs-150 gap is itself a paper result.
    source: "radiator 5.5-34 kg/kW [Wikipedia spacecraft thermal control; advanced radiator review]; system claims 10 kg/kW [SpaceX]"
    status: sourced

  launch_factor_combustion_only:
    value: 28.0
    low: 17.0
    high: 63.0
    unit: kgCO2/kg
    # DERIVED, Falcon-class to dawn-dusk SSO ~650 km nominal.
    # Combustion factor ~3 kgCO2/kg kerosene (RP-1 ~C12H26 stoichiometry).
    # FAA Falcon 9 Environmental Assessment: ~387 t CO2e/launch; direct combustion
    #   ~336 t (112 t kerosene x 3). Per-payload ~17-19 kgCO2/kg to LEO
    #   (Green Launch analysis, FAA-based). Low 17 = LEO; central ~24-28 =
    #   SSO-650km delta-V penalty (~1.4x); high 63 = 1600 km dawn-dusk SSO (delta-V).
    source: "FAA SpaceX Falcon Program Environmental Assessment + RP-1 combustion stoichiometry; per-payload ~17-19 kgCO2/kg LEO scaled for SSO altitude"
    status: sourced

  launch_factor_embodied_included:
    value: 70.0
    low: 40.0
    high: 250.0
    unit: kgCO2/kg
    # DERIVED build-up (raw CO2, production-inclusive; high-altitude FORCING is a
    # SEPARATE metric axis, not folded in here).
    # = combustion + manufacturing/propellant-production share. Production-inclusive
    #   factor estimated at ~2-4x combustion-only (MODELING ASSUMPTION, not measured).
    #   Embodied launch+reentry as the dominant orbital-DC carbon term:
    #   Saarland "Dirty Bits" [arXiv 2508.06250] (up to an order of magnitude worse).
    # Central ~70 (28 x 2.5); high 250 (1600 km + production). Revises brief's 185 down.
    source: "derived: combustion x estimated production multiplier (~2-4x, ASSUMPTION); embodied-launch evidence from Saarland [arXiv 2508.06250]"
    status: estimated

  forcing_multiplier:
    value: 10.0
    low: 1.0
    high: 50.0
    unit: dimensionless
    # THE CLIMATE-METRIC AXIS of C1 (CO2e / direct-CO2 for the launch).
    # Launch radiative forcing is dominated by black carbon (~70%) and alumina
    # (~28%); CO2 and H2O are minor. Ross & Sheaffer 2014 (Earth's Future 2:177-196,
    #   doi 10.1002/2013EF000160): instantaneous RF 16+/-8 mW/m^2 for a mixed fleet,
    #   BC-dominated, CO2 not a significant RF source. Ryan et al. 2022 (Earth's
    #   Future, doi 10.1029/2021EF002612): global-mean +3.9 mW/m^2, mostly BC.
    #   Ross et al. 2010 (GRL 37 L24810, doi 10.1029/2010GL044548).
    # Central ~10 (derived, GWP-100): BC index ~30-50 g/kg kerosene x BC GWP-100 ~900
    #   / CO2 ~3 kg/kg ~ 10. Low 1 = direct-CO2 metric (optimist boundary).
    #   High ~50 = instantaneous-forcing view (CO2 a few % of total launch forcing).
    # The wide range is the point: the verdict is sensitive to a contested,
    # unsettled metric choice -- this is why the two camps disagree.
    source: "Ross & Sheaffer 2014 [doi 10.1002/2013EF000160] (BC 70% + Al2O3 28%, CO2 minor, 16+/-8 mW/m2); Ryan 2022 [doi 10.1029/2021EF002612] (+3.9 mW/m2, BC-dominated); Ross 2010 [doi 10.1029/2010GL044548]; GWP-100 build-up"
    status: sourced

  orbital_embodied_per_kw:
    value: 0.0
    low: 0.0
    high: 0.0
    unit: kgCO2/kW
    # Bus electronics + solar array + radiator manufacturing, per kW.
    source: "[A SOURCER]"
    status: placeholder

  dc_construction_avoided_per_kw:
    value: 0.0
    low: 0.0
    high: 0.0
    unit: kgCO2/kW
    # Avoided terrestrial data-center construction (second-order term).
    source: "[A SOURCER]"
    status: placeholder

  # --- water axis ----------------------------------------------------------
  water_intensity_grid_gal_per_kwh:
    value: 0.30
    low: 0.10
    high: 0.45
    unit: gallon/kWh
    source: "[A SOURCER]"
    status: placeholder

  cooling_water_gal_per_kwh:
    value: 0.10
    low: 0.00
    high: 0.20
    unit: gallon/kWh
    source: "[A SOURCER]"
    status: placeholder
